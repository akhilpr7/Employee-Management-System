{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="d-flex align-items-center mb-4">
      <h3 class="fw-bold mb-0"><i class="bi bi-person-gear me-2 text-primary"></i>My Profile</h3>
      <a href="{% url 'accounts:change_password' %}" class="btn btn-outline-secondary btn-sm ms-auto">
        <i class="bi bi-key me-1"></i>Change Password
      </a>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
              </div>
            {% endfor %}
          </div>
          <div class="mt-4">
            <button class="btn btn-primary px-4" type="submit">
              <i class="bi bi-save me-2"></i>Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
